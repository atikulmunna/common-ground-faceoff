name: Deploy staging release once

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure temporary SSH access
        env:
          LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$LIGHTSAIL_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' '100.60.92.23 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIN1XaA4Ve/lETLJVeuZ5u7ZpShFhgLrw9JkJzdLsB/1f' > ~/.ssh/known_hosts

      - name: Back up and deploy immutable release
        run: |
          ssh -o BatchMode=yes ubuntu@100.60.92.23 'bash -s' <<'REMOTE'
          set -Eeuo pipefail

          release="4d33170-ui-refresh"
          registry="892217934322.dkr.ecr.us-east-1.amazonaws.com"
          runtime="/opt/common-ground"
          snapshot="$runtime/releases/$release"

          sudo systemctl start common-ground-backup.service
          sudo systemctl is-failed --quiet common-ground-backup.service && exit 1 || true

          sudo mkdir -p "$snapshot"
          sudo cp "$runtime/docker-compose.yml" "$snapshot/docker-compose.yml"
          sudo cp "$runtime/Caddyfile" "$snapshot/Caddyfile"

          rollback() {
            sudo cp "$snapshot/docker-compose.yml" "$runtime/docker-compose.yml"
            sudo docker compose -f "$runtime/docker-compose.yml" up -d
          }
          trap rollback ERR

          sudo sed -i -E "s|(common-ground-api:)[^[:space:]]+|\1staging-$release|" "$runtime/docker-compose.yml"
          sudo sed -i -E "s|(common-ground-web:)[^[:space:]]+|\1staging-$release|" "$runtime/docker-compose.yml"

          if aws sts get-caller-identity >/dev/null 2>&1; then
            aws ecr get-login-password --region us-east-1 | sudo docker login --username AWS --password-stdin "$registry"
          else
            sudo aws ecr get-login-password --region us-east-1 | sudo docker login --username AWS --password-stdin "$registry"
          fi

          sudo docker compose -f "$runtime/docker-compose.yml" pull api web
          sudo docker compose -f "$runtime/docker-compose.yml" run --rm api ./node_modules/.bin/prisma migrate deploy --schema apps/api/prisma/schema.prisma
          sudo docker compose -f "$runtime/docker-compose.yml" up -d api web
          curl --fail --silent --show-error --retry 12 --retry-delay 5 https://api.common-ground.100-60-92-23.sslip.io/ready
          trap - ERR
          sudo docker compose -f "$runtime/docker-compose.yml" ps
          REMOTE
