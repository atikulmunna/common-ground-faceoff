name: Deploy invite-only beta scope once

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure temporary SSH access
        env:
          LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$LIGHTSAIL_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf '%s\n' '100.60.92.23 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIN1XaA4Ve/lETLJVeuZ5u7ZpShFhgLrw9JkJzdLsB/1f' > ~/.ssh/known_hosts

      - name: Back up and deploy beta scope
        env:
          ECR_PASSWORD: ${{ secrets.ECR_PASSWORD }}
        run: |
          printf '%s' "$ECR_PASSWORD" | ssh -o BatchMode=yes ubuntu@100.60.92.23 \
            'sudo docker login --username AWS --password-stdin 892217934322.dkr.ecr.us-east-1.amazonaws.com'

          ssh -o BatchMode=yes ubuntu@100.60.92.23 'bash -s' <<'REMOTE'
          set -Eeuo pipefail
          runtime="/opt/common-ground"
          release="996d834-beta-scope"
          snapshot="$runtime/releases/$release"
          api_image="892217934322.dkr.ecr.us-east-1.amazonaws.com/common-ground-api:staging-$release"
          web_image="892217934322.dkr.ecr.us-east-1.amazonaws.com/common-ground-web:staging-$release"

          sudo systemctl start common-ground-backup.service
          sudo systemctl is-failed --quiet common-ground-backup.service && exit 1 || true
          sudo mkdir -p "$snapshot"
          sudo cp "$runtime/docker-compose.yml" "$snapshot/docker-compose.yml"
          sudo cp "$runtime/Caddyfile" "$snapshot/Caddyfile"

          rollback() {
            sudo cp "$snapshot/docker-compose.yml" "$runtime/docker-compose.yml"
            sudo docker compose -f "$runtime/docker-compose.yml" up -d
          }
          trap rollback ERR

          sudo python3 - "$runtime/docker-compose.yml" "$api_image" "$web_image" <<'PY'
          import pathlib
          import re
          import sys

          path = pathlib.Path(sys.argv[1])
          text = path.read_text()
          text, api_count = re.subn(
              r'^\s*image:\s*["\x27]?.*/common-ground-api:[^"\x27\s]+["\x27]?\s*$',
              f'    image: {sys.argv[2]}',
              text,
              flags=re.MULTILINE,
          )
          text, web_count = re.subn(
              r'^\s*image:\s*["\x27]?.*/common-ground-web:[^"\x27\s]+["\x27]?\s*$',
              f'    image: {sys.argv[3]}',
              text,
              flags=re.MULTILINE,
          )
          if (api_count, web_count) != (1, 1):
              raise SystemExit(f'expected one API and one web image line, found {(api_count, web_count)}')

          lines = text.splitlines()
          api_start = next(i for i, line in enumerate(lines) if re.match(r'^  api:\s*$', line))
          api_end = next((i for i in range(api_start + 1, len(lines)) if re.match(r'^  \S', lines[i])), len(lines))
          env_start = next(i for i in range(api_start + 1, api_end) if re.match(r'^    environment:\s*$', lines[i]))
          env_end = next((i for i in range(env_start + 1, api_end) if lines[i].strip() and len(lines[i]) - len(lines[i].lstrip()) <= 4), api_end)

          flags = {
              'ENABLE_PUBLIC_REGISTRATION': 'false',
              'ENABLE_BILLING': 'false',
              'ENABLE_SMS_MFA': 'false',
              'ENABLE_SAML': 'false',
              'ENABLE_EXTERNAL_EXPORT_STORAGE': 'false',
              'ENABLE_DATADOG': 'false',
          }
          for key, value in flags.items():
              match = next((i for i in range(env_start + 1, env_end) if re.match(rf'^\s+{key}:', lines[i])), None)
              replacement = f'      {key}: "{value}"'
              if match is None:
                  lines.insert(env_start + 1, replacement)
                  env_end += 1
                  api_end += 1
              else:
                  lines[match] = replacement

          path.write_text('\n'.join(lines) + '\n')
          PY

          sudo docker compose -f "$runtime/docker-compose.yml" config --quiet
          sudo docker compose -f "$runtime/docker-compose.yml" pull api web
          sudo docker compose -f "$runtime/docker-compose.yml" run -T --rm api ./node_modules/.bin/prisma migrate deploy --schema apps/api/prisma/schema.prisma </dev/null
          sudo docker compose -f "$runtime/docker-compose.yml" up -d --force-recreate api web

          curl --fail --silent --show-error --retry 12 --retry-delay 5 https://api.common-ground.100-60-92-23.sslip.io/ready >/dev/null
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' -X POST -H 'Content-Type: application/json' -d '{}' https://api.common-ground.100-60-92-23.sslip.io/auth/register)" = "403"
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' -X POST -H 'Content-Type: application/json' -d '{}' https://api.common-ground.100-60-92-23.sslip.io/billing/webhook)" = "401"
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' https://api.common-ground.100-60-92-23.sslip.io/saml/metadata)" = "401"

          trap - ERR
          sudo docker compose -f "$runtime/docker-compose.yml" ps
          REMOTE
